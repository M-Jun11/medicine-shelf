<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>医薬品棚管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;font-size:16px;}
input,select,button{font-family:inherit;}

/* 認証 */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a2a4a 0%,#0d4f6e 50%,#1a3a5c 100%);}
.auth-box{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:48px 40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.auth-icon{font-size:56px;margin-bottom:16px;}
.auth-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:8px;}
.auth-sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:32px;}
.auth-input{width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:18px;outline:none;margin-bottom:14px;transition:border-color .3s;}
.auth-input::placeholder{color:rgba(255,255,255,.4);}
.auth-input:focus{border-color:#00b4d8;}
.auth-input.shake{animation:shake .4s;}
.auth-error{color:#ff6b6b;font-size:14px;margin-bottom:10px;min-height:20px;}
.auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ヘッダー */
#main-screen{display:none;}
.header{background:linear-gradient(135deg,#1a2a4a,#0d4f6e);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{color:#fff;font-size:16px;font-weight:700;}
.header-sub{color:rgba(255,255,255,.45);font-size:11px;}
.logout-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;}

/* タブバー（2段） */
.tabs-wrap{background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:50;}
.tabs-row{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs-row::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#64748b;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.tab-btn.active{color:#0077b6;font-weight:700;border-bottom-color:#0077b6;}
.tab-btn.active-sel{color:#059669;font-weight:700;border-bottom-color:#059669;}
.tab-btn:hover:not(.active):not(.active-sel){background:#f8fafc;color:#334155;}

/* タブ区切り線 */
.tabs-divider{height:2px;background:#e2e8f0;}
.tabs-row2{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#f8fafc;}
.tabs-row2::-webkit-scrollbar{display:none;}
.tab-shelf-btn{padding:8px 12px;border:none;background:none;cursor:pointer;font-size:12px;color:#64748b;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.tab-shelf-btn.active{color:#0077b6;font-weight:700;border-bottom-color:#0077b6;background:#fff;}

/* コンテンツ */
.content{padding:16px;}

/* 検索バー */
.search-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px;}
.search-wrap{position:relative;}
.search-input{width:100%;padding:16px 18px 16px 52px;border:3px solid #e2e8f0;border-radius:14px;font-size:18px;outline:none;transition:all .2s;background:#fff;}
.search-input:focus{border-color:#00b4d8;box-shadow:0 0 0 4px rgba(0,180,216,.1);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:22px;opacity:.4;}
.search-meta{margin-top:10px;color:#94a3b8;font-size:13px;}

/* 薬品グリッド */
.med-list{display:flex;flex-direction:column;gap:10px;}
.med-card{background:#fff;border:2px solid #e2e8f0;border-radius:14px;padding:16px;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:14px;}
.med-card:hover{border-color:#7dd3f0;box-shadow:0 4px 16px rgba(0,120,180,.12);}
.med-card.selected{background:linear-gradient(135deg,#e0f7ff,#ccf0ff);border-color:#00b4d8;box-shadow:0 4px 16px rgba(0,180,216,.2);}
.check-circle{width:30px;height:30px;border-radius:50%;border:2.5px solid #cbd5e1;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;}
.med-card.selected .check-circle{background:#00b4d8;border-color:#00b4d8;}
.check-mark{color:#fff;font-size:15px;font-weight:700;}
.med-body{flex:1;min-width:0;}
.med-general{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:6px;line-height:1.4;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge-general{background:#0077b6;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.med-row{font-size:17px;color:#334155;line-height:1.8;display:flex;gap:6px;}
.med-row-label{color:#94a3b8;font-size:12px;font-weight:600;flex-shrink:0;padding-top:1px;}
.med-note{font-size:13px;color:#d97706;margin-top:4px;}
.shelf-badge{display:inline-block;background:#f1f5f9;color:#475569;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;margin-top:8px;}

/* 空状態 */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:64px;margin-bottom:16px;}
.empty-text{font-size:17px;font-weight:600;color:#94a3b8;margin-bottom:8px;}
.empty-sub{font-size:14px;color:#cbd5e1;}

/* ===== 選択中タブ ===== */
.sel-header{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.sel-header-title{font-size:18px;font-weight:700;color:#059669;}
.sel-count-badge{background:#059669;color:#fff;padding:4px 14px;border-radius:20px;font-size:15px;font-weight:700;}
.btn-clear-all{padding:10px 18px;background:#fff0f0;color:#dc2626;border:2px solid #fecaca;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}

/* 選択中カード（大きく・見やすく） */
.sel-list{display:flex;flex-direction:column;gap:12px;}
.sel-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px;position:relative;}
.sel-card-general{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.4;}
.badge-sel-general{background:#0077b6;color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;}
.sel-card-row{font-size:17px;color:#334155;line-height:1.8;display:flex;gap:8px;align-items:baseline;}
.sel-card-label{font-size:13px;color:#94a3b8;font-weight:700;flex-shrink:0;min-width:40px;}
.sel-card-shelf{display:inline-block;background:#f0f9ff;color:#0077b6;padding:5px 14px;border-radius:10px;font-size:14px;font-weight:700;margin-top:10px;}
.sel-remove-btn{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:#fff0f0;border:2px solid #fecaca;color:#dc2626;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

/* データ管理タブ */
.manage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.manage-title{font-size:17px;font-weight:700;}
.manage-actions{display:flex;gap:8px;flex-wrap:wrap;}
.import-label{padding:9px 14px;background:#0077b6;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-block;}
.btn{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-green{background:#059669;color:#fff;}
.btn-gray{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.btn-sm{padding:7px 12px;font-size:12px;}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px;}
.med-table{width:100%;border-collapse:collapse;}
.med-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:600;border-bottom:2px solid #e2e8f0;}
.med-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:middle;}
.med-table tr:last-child td{border-bottom:none;}
.med-table tr:hover td{background:#fafcff;}
.edit-input{width:100%;padding:6px 8px;border:1.5px solid #00b4d8;border-radius:6px;font-size:12px;outline:none;}
.edit-select{padding:5px 8px;border:1.5px solid #00b4d8;border-radius:6px;font-size:12px;outline:none;background:#fff;}
.table-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;margin-right:3px;}
.table-btn-edit{background:#e0f2fe;color:#0077b6;}
.table-btn-del{background:#fff0f0;color:#dc2626;}
.table-btn-save{background:#0077b6;color:#fff;}
.table-btn-cancel{background:#f1f5f9;color:#64748b;}
.bulk-panel{background:#fff8e1;border:2px solid #f59e0b;border-radius:12px;padding:16px;margin-bottom:14px;}
.bulk-title{font-size:13px;font-weight:700;color:#92400e;margin-bottom:12px;}
.bulk-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.bulk-field label{display:block;font-size:11px;color:#92400e;margin-bottom:4px;font-weight:600;}
.bulk-field select,.bulk-field input{padding:8px 10px;border:1.5px solid #f59e0b;border-radius:7px;font-size:13px;outline:none;background:#fff;}
.bulk-field input{width:160px;}
.btn-amber{background:#f59e0b;color:#fff;padding:9px 18px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
.import-hint{background:#f0f9ff;border:1.5px solid #00b4d8;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:#0077b6;line-height:1.7;}
.import-hint strong{display:block;margin-bottom:4px;font-size:13px;}
.import-hint code{background:#e0f7ff;padding:1px 5px;border-radius:4px;font-family:monospace;}

/* トースト */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:14px 28px;border-radius:14px;font-size:15px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

@media(min-width:600px){
  .med-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}
  .sel-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
}
</style>
</head>
<body>

<!-- 認証 -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-icon">&#128138;</div>
    <h2 class="auth-title">医薬品棚管理システム</h2>
    <p class="auth-sub">パスワードを入力してください</p>
    <input type="password" id="pw-input" class="auth-input" placeholder="パスワード" maxlength="20"/>
    <div id="auth-error" class="auth-error"></div>
    <button class="auth-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- メイン -->
<div id="main-screen">
  <div class="header">
    <div>
      <div class="header-title">&#128138; 医薬品棚管理システム</div>
      <div class="header-sub">Medicine Shelf Manager</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>

  <!-- タブ（1段目） -->
  <div class="tabs-wrap">
    <div class="tabs-row" id="tabs-row1">
      <button class="tab-btn active" onclick="switchMainTab('search',this)" id="tab-search-btn">&#128269; 薬品検索</button>
      <button class="tab-btn" onclick="switchMainTab('manage',this)">&#9999; データ管理</button>
    </div>
    <!-- 棚フィルター（2段目、検索タブのみ表示） -->
    <div id="shelf-tabs-row" class="tabs-row2"></div>
  </div>

  <!-- 検索タブ -->
  <div id="tab-search" class="content">
    <div class="search-card">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" class="search-input"
          placeholder="一般名・後発品名・先発品名で検索（ひらがなOK）"
          oninput="doSearch()"/>
      </div>
      <div id="search-meta" class="search-meta">薬品名を入力して検索してください</div>
    </div>
    <div class="med-list" id="med-list"></div>

    <!-- 選択済みパネル -->
    <div id="sel-panel" style="display:none;margin-top:20px;">
      <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:18px;font-weight:700;color:#059669;">&#9989; 選択中の薬品 <span id="sel-count-badge" style="background:#059669;color:#fff;padding:3px 12px;border-radius:14px;font-size:14px;margin-left:6px;">0件</span></div>
        <button class="btn-clear-all" onclick="clearAll()">&#128465; 全クリア</button>
      </div>
      <div class="sel-list" id="sel-list"></div>
    </div>
  </div>

  <!-- 選択済みパネル（検索タブ内・下部固定表示） -->
  <div id="tab-selected" style="display:none;"></div>

  <!-- データ管理タブ -->
  <div id="tab-manage" class="content" style="display:none;">
    <div class="bulk-panel">
      <div class="bulk-title">&#127991; 一括棚変更</div>
      <div class="bulk-row">
        <div class="bulk-field"><label>現在の棚種類</label><select id="bulk-from"><option value="">選択してください</option></select></div>
        <div class="bulk-field"><label>&#8594; 変更後の棚種類</label><input type="text" id="bulk-to" placeholder="新しい棚名を入力"/></div>
        <button class="btn-amber" onclick="doBulkChange()">一括変更実行</button>
        <div id="bulk-result" style="font-size:12px;color:#92400e;align-self:center;"></div>
      </div>
    </div>
    <div class="import-hint">
      <strong>&#128229; CSVインポート（Excelで管理&#8594;取り込み）</strong>
      スプレッドシートを <code>CSV UTF-8</code> で保存 &#8594; 「CSVインポート」ボタンで読み込み。<br>
      必要な列：<code>一般名称</code>&#12288;<code>後発/ジェネリック</code>&#12288;<code>先発</code>&#12288;<code>棚の種類</code>&#12288;<code>Note</code>
    </div>
    <div class="manage-header">
      <div><div class="manage-title">医薬品データ管理</div><div style="font-size:12px;color:#94a3b8;margin-top:2px;" id="manage-count"></div></div>
      <div class="manage-actions">
        <label class="import-label">&#128229; CSVインポート<input type="file" accept=".csv" style="display:none;" onchange="importCSV(this)"/></label>
        <button class="btn btn-green btn-sm" onclick="exportCurrentCSV()">&#128228; CSV出力</button>
        <button class="btn btn-gray btn-sm" onclick="resetToDefault()">&#128260; 初期データ</button>
      </div>
    </div>

    <!-- 管理画面 検索バー -->
    <div class="card" style="padding:14px 16px;margin-bottom:10px;">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div style="position:relative;flex:1;min-width:200px;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.4;">&#128269;</span>
          <input type="text" id="manage-search" placeholder="一般名・後発品名・先発品名で絞り込み"
            oninput="renderManage()"
            style="width:100%;padding:11px 14px 11px 40px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;"/>
        </div>
        <button onclick="toggleAddForm()" id="add-form-toggle-btn"
          style="padding:10px 18px;background:#0077b6;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;">
          &#65291; 1件追加
        </button>
      </div>
    </div>

    <!-- 追加フォーム（初期非表示） -->
    <div id="add-form-panel" style="display:none;" class="card">
      <div style="font-size:15px;font-weight:700;color:#0077b6;margin-bottom:14px;">&#65291; 新しい薬品を追加</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div>
          <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">一般名称 <span style="color:#dc2626;">*</span></label>
          <input type="text" id="add-general" placeholder="例：アムロジピン錠" style="width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;"/>
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">棚の種類 <span style="color:#dc2626;">*</span></label>
          <div style="display:flex;gap:6px;">
            <select id="add-shelf-sel" style="flex:1;padding:10px 8px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fff;" onchange="toggleAddShelfCustom()">
              <option value="">選択してください</option>
            </select>
            <input type="text" id="add-shelf-custom" placeholder="その他" style="flex:1;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;display:none;"/>
          </div>
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">後発/ジェネリック</label>
          <input type="text" id="add-generic" placeholder="例：アムロジピン錠5mg「サワイ」" style="width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;"/>
        </div>
        <div>
          <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">先発</label>
          <input type="text" id="add-brand" placeholder="例：ノルバスク錠5mg" style="width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;"/>
        </div>
        <div style="grid-column:1/-1;">
          <label style="font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;">Note</label>
          <input type="text" id="add-note" placeholder="備考・メモ" style="width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;"/>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="submitAddForm()" style="padding:10px 22px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">追加する</button>
        <button onclick="toggleAddForm()" style="padding:10px 16px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;cursor:pointer;">キャンセル</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:auto;">
      <table class="med-table">
        <thead><tr><th>#</th><th>一般名称</th><th>後発/ジェネリック</th><th>先発</th><th>棚の種類</th><th>Note</th><th style="width:110px;">操作</th></tr></thead>
        <tbody id="manage-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

var medicines = [];
var selected = [];
var currentShelf = "ALL";
var currentMainTab = "search";
var editingId = null;

function toKatakana(s) {
  return String(s||'').replace(/[\u3041-\u3096]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0)+0x60);
  });
}
function norm(s) { return toKatakana(String(s||'').normalize('NFKC')); }

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
function doLogin() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    init();
  } else {
    var inp = document.getElementById('pw-input');
    document.getElementById('auth-error').textContent = 'パスワードが違います';
    inp.classList.add('shake');
    setTimeout(function() { inp.classList.remove('shake'); document.getElementById('auth-error').textContent=''; }, 600);
  }
}
function doLogout() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}
function init() {
  var s = localStorage.getItem(STORAGE_KEY);
  medicines = s ? JSON.parse(s) : JSON.parse(JSON.stringify(INITIAL_DATA));
  buildShelfTabs();
  updateSelCount();
  renderManage();
  document.getElementById('search-meta').textContent = '薬品名を入力して検索してください（' + medicines.length + '件）';
}
function saveMeds() { localStorage.setItem(STORAGE_KEY, JSON.stringify(medicines)); }

var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

/* ===== メインタブ切替 ===== */
function switchMainTab(name, btn) {
  currentMainTab = name;
  document.getElementById('tab-search').style.display   = name==='search'   ? '' : 'none';
  document.getElementById('tab-manage').style.display   = name==='manage'   ? '' : 'none';
  document.getElementById('shelf-tabs-row').style.display = name==='search' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active','active-sel'); });
  btn.classList.add(name==='selected' ? 'active-sel' : 'active');
  if (name==='manage') renderManage();
}

/* ===== 棚タブ ===== */
function buildShelfTabs() {
  var shelfSet = {};
  medicines.forEach(function(m) { if(m.shelf) shelfSet[m.shelf]=true; });
  var shelves = ['ALL'].concat(Object.keys(shelfSet).sort());
  var row = document.getElementById('shelf-tabs-row');
  row.innerHTML = '';
  shelves.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'tab-shelf-btn' + (s===currentShelf ? ' active' : '');
    var count = s==='ALL' ? medicines.length : medicines.filter(function(m){return m.shelf===s;}).length;
    btn.textContent = (s==='ALL' ? '全て' : s) + '(' + count + ')';
    btn.onclick = function() { currentShelf=s; buildShelfTabs(); doSearch(); };
    row.appendChild(btn);
  });
}

/* ===== 検索 ===== */
function doSearch() {
  var q = norm(document.getElementById('search-input').value.trim());
  var list = medicines;
  if (currentShelf !== 'ALL') list = list.filter(function(m) { return m.shelf===currentShelf; });
  if (!q) {
    document.getElementById('search-meta').textContent = '薬品名を入力して検索してください（' + list.length + '件）';
    document.getElementById('med-list').innerHTML = '';
    return;
  }
  var scored = [];
  list.forEach(function(m) {
    var ng=norm(m.general), nc=norm(m.generic), nb=norm(m.brand);
    if (ng.indexOf(q)<0 && nc.indexOf(q)<0 && nb.indexOf(q)<0) return;
    var isPrefix = ng.indexOf(q)===0 || nc.indexOf(q)===0 || nb.indexOf(q)===0;
    scored.push({med:m, score:isPrefix?0:1});
  });
  scored.sort(function(a,b){return a.score-b.score;});
  list = scored.map(function(s){return s.med;});
  document.getElementById('search-meta').textContent = list.length + '件ヒット / ' + selected.length + '件選択中';
  renderMedList(list);
}

function renderMedList(list) {
  var el = document.getElementById('med-list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">該当する薬品が見つかりません</div><div class="empty-sub">別のキーワードで検索してください</div></div>';
    return;
  }
  list.forEach(function(med) {
    var isSel = selected.some(function(s){return s.id===med.id;});
    var div = document.createElement('div');
    div.className = 'med-card' + (isSel?' selected':'');
    div.innerHTML =
      '<div class="check-circle"><span class="check-mark">'+(isSel?'&#10003;':'')+'</span></div>'+
      '<div class="med-body">'+
        '<div class="med-general"><span class="badge-general">一般</span>'+esc(med.general)+'</div>'+
        '<div class="med-row"><span class="med-row-label">先発</span><span>'+esc(med.brand||'ー')+'</span></div>'+
        '<div class="med-row"><span class="med-row-label">後発</span><span>'+esc(med.generic||'なし')+'</span></div>'+
        (med.note&&med.note!=='ー'?'<div class="med-note">&#128204; '+esc(med.note)+'</div>':'')+
        '<span class="shelf-badge">'+esc(med.shelf||'ー')+'</span>'+
      '</div>';
    div.onclick = function(){toggleSelect(med);};
    el.appendChild(div);
  });
}

/* ===== 選択トグル ===== */
function toggleSelect(med) {
  var idx = selected.findIndex(function(s){return s.id===med.id;});
  if (idx>=0) {
    selected.splice(idx,1);
    toast('選択を解除しました');
    doSearch();
  } else {
    selected.push(med);
    toast('✅ 選択しました');
    document.getElementById('search-input').value='';
    currentShelf='ALL';
    buildShelfTabs();
    doSearch();
    document.getElementById('search-input').focus();
  }
  updateSelCount();
  renderSelTab();
}

function updateSelCount() {
  var n = selected.length;
  document.getElementById('sel-count-badge').textContent = n + '件';
  document.getElementById('sel-panel').style.display = n > 0 ? '' : 'none';
}

function removeSel(id) {
  selected = selected.filter(function(s){return s.id!==id;});
  updateSelCount();
  doSearch();
  renderSelTab();
}
function clearAll() {
  if (!selected.length) return;
  if (!confirm('選択中の薬品をすべてクリアしますか？')) return;
  selected=[];
  updateSelCount();
  doSearch();
  renderSelTab();
  toast('すべてクリアしました');
}

/* ===== 選択中タブ描画 ===== */
function renderSelTab() {
  var list = document.getElementById('sel-list');
  document.getElementById('sel-count-badge').textContent = selected.length + '件';
  document.getElementById('sel-panel').style.display = selected.length > 0 ? '' : 'none';
  if (!selected.length) { list.innerHTML=''; return; }
  list.innerHTML='';
  selected.forEach(function(m) {
    var div = document.createElement('div');
    div.className = 'sel-card';
    div.innerHTML =
      '<button class="sel-remove-btn" onclick="removeSel('+m.id+')">&#10005;</button>'+
      '<div class="sel-card-general"><span class="badge-sel-general">一般</span>'+esc(m.general)+'</div>'+
      '<div class="sel-card-row"><span class="sel-card-label">先発</span><span>'+esc(m.brand||'ー')+'</span></div>'+
      '<div class="sel-card-row"><span class="sel-card-label">後発</span><span>'+esc(m.generic||'なし')+'</span></div>'+
      (m.note&&m.note!=='ー'?'<div style="font-size:14px;color:#d97706;margin-top:6px;">&#128204; '+esc(m.note)+'</div>':'')+
      '<span class="sel-card-shelf">&#127991; '+esc(m.shelf||'ー')+'</span>';
    list.appendChild(div);
  });
}

/* ===== データ管理 ===== */
function renderManage() {
  var tbody = document.getElementById('manage-tbody');
  var mq = document.getElementById('manage-search');
  var q = mq ? norm(mq.value.trim()) : '';
  var displayList = q ? medicines.filter(function(m){
    return norm(m.general).indexOf(q)>=0 || norm(m.generic).indexOf(q)>=0 || norm(m.brand).indexOf(q)>=0;
  }) : medicines;
  document.getElementById('manage-count').textContent = q ? (displayList.length + '件ヒット / 全' + medicines.length + '件') : medicines.length+'件';
  tbody.innerHTML='';
  var shelfSet={};
  medicines.forEach(function(m){if(m.shelf)shelfSet[m.shelf]=true;});
  var shelfOptions=Object.keys(shelfSet).sort();

  // ★修正箇所：追加フォームの棚セレクトを毎回リセットして再構築
  var addSel = document.getElementById('add-shelf-sel');
  if (addSel) {
    var currentVal = addSel.value;
    addSel.innerHTML = '<option value="">選択してください</option>';
    shelfOptions.forEach(function(s){
      var opt=document.createElement('option'); opt.value=s; opt.textContent=s; addSel.appendChild(opt);
    });
    var other=document.createElement('option'); other.value='__custom__'; other.textContent='その他（直接入力）'; addSel.appendChild(other);
    // 選択中の値を復元（フォームが開いている場合）
    if (currentVal) addSel.value = currentVal;
  }

  displayList.forEach(function(med,i){
    var tr=document.createElement('tr');
    if (editingId===med.id) {
      var opts=shelfOptions.map(function(s){return '<option value="'+esc(s)+'"'+(s===med.shelf?' selected':'')+'>'+esc(s)+'</option>';}).join('')+'<option value="__custom__">その他(入力)</option>';
      tr.innerHTML='<td>'+(i+1)+'</td>'+
        '<td><input class="edit-input" id="e-general" value="'+esc(med.general)+'"/></td>'+
        '<td><input class="edit-input" id="e-generic" value="'+esc(med.generic)+'"/></td>'+
        '<td><input class="edit-input" id="e-brand" value="'+esc(med.brand)+'"/></td>'+
        '<td><select class="edit-select" id="e-shelf">'+opts+'</select><input class="edit-input" id="e-shelf-custom" placeholder="新しい棚名" style="margin-top:4px;display:none;"/></td>'+
        '<td><input class="edit-input" id="e-note" value="'+esc(med.note)+'"/></td>'+
        '<td><button class="table-btn table-btn-save" onclick="saveEdit('+med.id+')">保存</button><button class="table-btn table-btn-cancel" onclick="cancelEdit()">×</button></td>';
      setTimeout(function(){var sel=document.getElementById('e-shelf');if(sel)sel.onchange=function(){document.getElementById('e-shelf-custom').style.display=sel.value==='__custom__'?'':'none';};},0);
    } else {
      tr.innerHTML='<td style="color:#94a3b8;">'+(i+1)+'</td>'+
        '<td style="font-weight:600;">'+esc(med.general)+'</td>'+
        '<td>'+esc(med.generic)+'</td>'+
        '<td>'+esc(med.brand)+'</td>'+
        '<td><span class="shelf-badge">'+esc(med.shelf||'ー')+'</span></td>'+
        '<td style="color:#94a3b8;font-size:11px;">'+esc(med.note)+'</td>'+
        '<td><button class="table-btn table-btn-edit" onclick="startEdit('+med.id+')">編集</button><button class="table-btn table-btn-del" onclick="deleteMed('+med.id+')">削除</button></td>';
    }
    tbody.appendChild(tr);
  });
  updateBulkFromSelect();
}
function startEdit(id){editingId=id;renderManage();}
function cancelEdit(){editingId=null;renderManage();}
function saveEdit(id){
  var med=null;
  for(var i=0;i<medicines.length;i++){if(medicines[i].id===id){med=medicines[i];break;}}
  if(!med)return;
  var sel=document.getElementById('e-shelf');
  var custom=document.getElementById('e-shelf-custom');
  med.general=document.getElementById('e-general').value.trim();
  med.generic=document.getElementById('e-generic').value.trim();
  med.brand=document.getElementById('e-brand').value.trim();
  med.shelf=sel.value==='__custom__'?custom.value.trim():sel.value;
  med.note=document.getElementById('e-note').value.trim();
  editingId=null;
  saveMeds();buildShelfTabs();doSearch();renderManage();
  toast('更新しました');
}
function deleteMed(id){
  if(!confirm('削除しますか？'))return;
  medicines=medicines.filter(function(m){return m.id!==id;});
  saveMeds();buildShelfTabs();doSearch();renderManage();
  toast('削除しました');
}
function toggleAddForm() {
  var panel = document.getElementById('add-form-panel');
  var btn = document.getElementById('add-form-toggle-btn');
  var isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  btn.textContent = isOpen ? '＋ 1件追加' : '✕ 閉じる';
  if (!isOpen) {
    ['add-general','add-generic','add-brand','add-note'].forEach(function(id){
      document.getElementById(id).value='';
    });
    document.getElementById('add-shelf-sel').value='';
    document.getElementById('add-shelf-custom').style.display='none';
    document.getElementById('add-shelf-custom').value='';
    setTimeout(function(){document.getElementById('add-general').focus();},100);
  }
}
function toggleAddShelfCustom() {
  var sel = document.getElementById('add-shelf-sel');
  var custom = document.getElementById('add-shelf-custom');
  custom.style.display = sel.value==='__custom__' ? '' : 'none';
}
function submitAddForm() {
  var general = document.getElementById('add-general').value.trim();
  var shelfSel = document.getElementById('add-shelf-sel').value;
  var shelfCustom = document.getElementById('add-shelf-custom').value.trim();
  var shelf = shelfSel==='__custom__' ? shelfCustom : shelfSel;
  if (!general) { toast('⚠️ 一般名称は必須です'); return; }
  if (!shelf) { toast('⚠️ 棚の種類を選択または入力してください'); return; }
  var newMed = {
    id: Date.now(),
    general: general,
    generic: document.getElementById('add-generic').value.trim(),
    brand: document.getElementById('add-brand').value.trim(),
    shelf: shelf,
    note: document.getElementById('add-note').value.trim()
  };
  medicines.push(newMed);
  saveMeds(); buildShelfTabs(); renderManage();
  toggleAddForm();
  toast('✅ 追加しました：' + general);
}
function updateBulkFromSelect(){
  var sel=document.getElementById('bulk-from');
  var shelfSet={};
  medicines.forEach(function(m){if(m.shelf)shelfSet[m.shelf]=true;});
  sel.innerHTML='<option value="">選択してください</option>'+Object.keys(shelfSet).sort().map(function(s){return '<option value="'+esc(s)+'">'+esc(s)+'</option>';}).join('');
}
function doBulkChange(){
  var from=document.getElementById('bulk-from').value;
  var to=document.getElementById('bulk-to').value.trim();
  if(!from){toast('変更元の棚種類を選択してください');return;}
  if(!to){toast('変更後の棚名を入力してください');return;}
  if(!confirm('「'+from+'」→「'+to+'」に一括変更しますか？'))return;
  var count=0;
  medicines.forEach(function(m){if(m.shelf===from){m.shelf=to;count++;}});
  saveMeds();buildShelfTabs();doSearch();renderManage();
  document.getElementById('bulk-result').textContent=count+'件を変更しました';
  toast(count+'件を「'+to+'」に変更しました');
}
function importCSV(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    var lines=text.split('\n').filter(function(l){return l.trim();});
    if(lines.length<2){toast('データが見つかりません');return;}
    var headers=parseCSVLine(lines[0]);
    var colMap={};
    ['一般名称','後発/ジェネリック','先発','棚の種類','Note'].forEach(function(col){
      for(var i=0;i<headers.length;i++){if(headers[i].trim()===col){colMap[col]=i;break;}}
    });
    if(colMap['一般名称']==null){toast('「一般名称」列が見つかりません');return;}
    var imported=[];var baseId=Date.now();
    for(var i=1;i<lines.length;i++){
      var cells=parseCSVLine(lines[i]);
      if(!cells.length)continue;
      imported.push({id:baseId++,general:cells[colMap['一般名称']]||'',generic:colMap['後発/ジェネリック']!=null?(cells[colMap['後発/ジェネリック']]||''):'',brand:colMap['先発']!=null?(cells[colMap['先発']]||''):'',shelf:colMap['棚の種類']!=null?(cells[colMap['棚の種類']]||''):'',note:colMap['Note']!=null?(cells[colMap['Note']]||''):''});
    }
    if(!confirm(imported.length+'件をインポートします。OK=上書き / キャンセル=追加')){medicines=medicines.concat(imported);}else{medicines=imported;}
    saveMeds();buildShelfTabs();doSearch();renderManage();
    toast(imported.length+'件をインポートしました');
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}
function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else{cur+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){result.push(cur);cur='';}else{cur+=c;}}
  }
  result.push(cur);return result;
}
function exportCurrentCSV(){
  var BOM='\uFEFF';
  var csv=BOM+'一般名称,後発/ジェネリック,先発,棚の種類,Note\n';
  medicines.forEach(function(m){csv+=[m.general,m.generic,m.brand,m.shelf,m.note].map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(',')+'\n';});
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='医薬品データ.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('CSVを出力しました');
}
function resetToDefault(){
  if(!confirm('初期データに戻します。よろしいですか？'))return;
  medicines=JSON.parse(JSON.stringify(INITIAL_DATA));
  saveMeds();buildShelfTabs();doSearch();renderManage();
  toast('初期データに戻しました');
}
function esc(str){
  return String(str||'').replace(/[&<>"']/g,function(s){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s];});
}
