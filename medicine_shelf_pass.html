<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>医薬品棚管理システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;}
input,select,button{font-family:inherit;}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a2a4a 0%,#0d4f6e 50%,#1a3a5c 100%);}
.auth-box{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:48px 40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.auth-icon{font-size:52px;margin-bottom:16px;}
.auth-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;}
.auth-sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:32px;}
.auth-input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:12px;transition:border-color .3s;}
.auth-input::placeholder{color:rgba(255,255,255,.4);}
.auth-input:focus{border-color:#00b4d8;}
.auth-input.shake{animation:shake .4s;}
.auth-error{color:#ff6b6b;font-size:13px;margin-bottom:10px;min-height:18px;}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#main-screen{display:none;}
.header{background:linear-gradient(135deg,#1a2a4a,#0d4f6e);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-icon{font-size:28px;}
.header-title{color:#fff;font-size:17px;font-weight:700;}
.header-sub{color:rgba(255,255,255,.45);font-size:11px;}
.logout-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
.tabs{background:#fff;border-bottom:2px solid #e2e8f0;display:flex;overflow-x:auto;}
.tab-btn{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:#64748b;font-weight:400;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;}
.tab-btn.active{color:#0077b6;font-weight:700;border-bottom-color:#0077b6;}
.tab-btn:hover:not(.active){color:#334155;background:#f8fafc;}
.content{max-width:1000px;margin:0 auto;padding:20px 16px;}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;}
.search-wrap{position:relative;}
.search-input{width:100%;padding:16px 20px 16px 52px;border:3px solid #e2e8f0;border-radius:14px;font-size:16px;outline:none;transition:border-color .2s;background:#fff;}
.search-input:focus{border-color:#00b4d8;box-shadow:0 0 0 4px rgba(0,180,216,.1);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:22px;opacity:.4;}
.search-meta{margin-top:10px;color:#94a3b8;font-size:13px;}
.empty-hint{text-align:center;padding:60px 20px;color:#cbd5e1;}
.empty-hint-icon{font-size:64px;margin-bottom:16px;}
.empty-hint-text{font-size:16px;font-weight:600;color:#94a3b8;margin-bottom:8px;}
.empty-hint-sub{font-size:13px;color:#cbd5e1;}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.filter-btn{padding:5px 12px;border:1.5px solid #e2e8f0;border-radius:20px;background:#fff;font-size:12px;cursor:pointer;color:#64748b;transition:all .15s;}
.filter-btn.active{background:#0077b6;border-color:#0077b6;color:#fff;font-weight:600;}
.filter-btn:hover:not(.active){border-color:#00b4d8;color:#0077b6;}
.med-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:16px;}
.med-card{background:#fff;border:2px solid #e2e8f0;border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:12px;}
.med-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,180,.18);border-color:#7dd3f0;}
.med-card.selected{background:linear-gradient(135deg,#e0f7ff,#b8eaff);border-color:#00b4d8;box-shadow:0 4px 16px rgba(0,180,216,.2);}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid #cbd5e1;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;}
.med-card.selected .check-circle{background:#00b4d8;border-color:#00b4d8;}
.check-mark{color:#fff;font-size:13px;font-weight:700;}
.med-name{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:5px;line-height:1.4;}
.med-meta{font-size:12px;color:#64748b;line-height:1.7;}
.med-meta-label{color:#94a3b8;font-size:11px;}
.shelf-badge{display:inline-block;background:#f1f5f9;color:#475569;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-top:6px;}
#selected-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:3px solid #00b4d8;box-shadow:0 -4px 24px rgba(0,0,0,.12);z-index:100;transition:transform .3s;max-height:55vh;display:flex;flex-direction:column;}
#selected-panel.hidden{transform:translateY(100%);}
.sel-panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.sel-panel-title{font-size:14px;font-weight:700;color:#0077b6;}
.btn-clear-all{padding:6px 14px;background:#fff0f0;color:#dc2626;border:1.5px solid #fecaca;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.sel-panel-body{overflow-y:auto;padding:12px 20px;flex:1;}
.sel-tags{display:flex;flex-wrap:wrap;gap:8px;}
.sel-tag{background:#e0f7ff;border:1.5px solid #00b4d8;color:#0077b6;padding:8px 10px 8px 14px;border-radius:14px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:8px;}
.sel-tag-info{display:flex;flex-direction:column;gap:2px;}
.sel-tag-general{font-size:13px;font-weight:700;color:#0077b6;}
.sel-tag-brand{font-size:11px;font-weight:600;color:#0369a1;}
.sel-tag-generic{font-size:11px;font-weight:400;color:#64748b;}
.sel-tag-shelf{font-size:10px;color:#0891b2;margin-top:2px;}
.sel-remove{cursor:pointer;opacity:.5;font-size:16px;line-height:1;flex-shrink:0;margin-top:2px;}
.sel-remove:hover{opacity:1;color:#dc2626;}
.manage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.manage-title{font-size:17px;font-weight:700;}
.manage-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.import-label{padding:8px 14px;background:#0077b6;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-block;}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-green{background:#059669;color:#fff;}
.btn-gray{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.btn-sm{padding:6px 12px;font-size:12px;}
.med-table{width:100%;border-collapse:collapse;}
.med-table th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:600;border-bottom:2px solid #e2e8f0;}
.med-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:middle;}
.med-table tr:last-child td{border-bottom:none;}
.med-table tr:hover td{background:#fafcff;}
.edit-input{width:100%;padding:6px 8px;border:1.5px solid #00b4d8;border-radius:6px;font-size:12px;outline:none;}
.edit-select{padding:5px 8px;border:1.5px solid #00b4d8;border-radius:6px;font-size:12px;outline:none;background:#fff;}
.table-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;margin-right:3px;}
.table-btn-edit{background:#e0f2fe;color:#0077b6;}
.table-btn-del{background:#fff0f0;color:#dc2626;}
.table-btn-save{background:#0077b6;color:#fff;}
.table-btn-cancel{background:#f1f5f9;color:#64748b;}
.bulk-panel{background:#fff8e1;border:2px solid #f59e0b;border-radius:12px;padding:16px;margin-bottom:16px;}
.bulk-title{font-size:13px;font-weight:700;color:#92400e;margin-bottom:12px;}
.bulk-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.bulk-field label{display:block;font-size:11px;color:#92400e;margin-bottom:4px;font-weight:600;}
.bulk-field select,.bulk-field input{padding:8px 10px;border:1.5px solid #f59e0b;border-radius:7px;font-size:13px;outline:none;background:#fff;}
.bulk-field input{width:180px;}
.btn-amber{background:#f59e0b;color:#fff;padding:8px 18px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
.import-hint{background:#f0f9ff;border:1.5px solid #00b4d8;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:12px;color:#0077b6;line-height:1.7;}
.import-hint strong{display:block;margin-bottom:4px;font-size:13px;}
.import-hint code{background:#e0f7ff;padding:1px 5px;border-radius:4px;font-family:monospace;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:600px){.med-grid{grid-template-columns:1fr;}.auth-box{width:90%;padding:36px 24px;}.content{padding:12px 10px;}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-icon">&#128138;</div>
    <h2 class="auth-title">医薬品棚管理システム</h2>
    <p class="auth-sub">パスワードを入力してください</p>
    <input type="password" id="pw-input" class="auth-input" placeholder="パスワード" maxlength="20"/>
    <div id="auth-error" class="auth-error"></div>
    <button class="auth-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>
<div id="main-screen">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">&#128138;</span>
      <div><div class="header-title">医薬品棚管理システム</div><div class="header-sub">Medicine Shelf Manager</div></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search',this)">&#128269; 薬品検索・選択</button>
    <button class="tab-btn" onclick="switchTab('manage',this)">&#9999; データ管理・棚変更</button>
  </div>
  <div id="tab-search" class="content">
    <div class="card">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" class="search-input" placeholder="一般名・後発品名・先発品名で検索（ひらがなOK）" oninput="doSearch()"/>
      </div>
      <div id="search-meta" class="search-meta">読み込み中...</div>
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="med-grid" id="med-grid"></div>
  </div>
  <div id="tab-manage" class="content" style="display:none;">
    <div class="bulk-panel">
      <div class="bulk-title">&#127991; 一括棚変更</div>
      <div class="bulk-row">
        <div class="bulk-field"><label>現在の棚種類</label><select id="bulk-from"><option value="">選択してください</option></select></div>
        <div class="bulk-field"><label>&#8594; 変更後の棚種類</label><input type="text" id="bulk-to" placeholder="新しい棚名を入力"/></div>
        <button class="btn-amber" onclick="doBulkChange()">一括変更実行</button>
        <div id="bulk-result" style="font-size:12px;color:#92400e;align-self:center;"></div>
      </div>
    </div>
    <div class="import-hint">
      <strong>&#128229; CSVインポート（Excelで管理&#8594;取り込み）</strong>
      スプレッドシートを <code>CSV UTF-8</code> で保存 &#8594; 「CSVインポート」ボタンで読み込み。<br>
      必要な列：<code>一般名称</code>　<code>後発/ジェネリック</code>　<code>先発</code>　<code>棚の種類</code>　<code>Note</code>
    </div>
    <div class="manage-header">
      <div><div class="manage-title">医薬品データ管理</div><div style="font-size:12px;color:#94a3b8;margin-top:2px;" id="manage-count"></div></div>
      <div class="manage-actions">
        <label class="import-label">&#128229; CSVインポート<input type="file" accept=".csv" style="display:none;" onchange="importCSV(this)"/></label>
        <button class="btn btn-green btn-sm" onclick="exportCurrentCSV()">&#128228; CSV出力</button>
        <button class="btn btn-gray btn-sm" onclick="addNewRow()">&#65291; 1件追加</button>
        <button class="btn btn-gray btn-sm" onclick="resetToDefault()">&#128260; 初期データに戻す</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:auto;">
      <table class="med-table">
        <thead><tr><th style="width:36px;">#</th><th>一般名称</th><th>後発/ジェネリック</th><th>先発</th><th>棚の種類</th><th>Note</th><th style="width:110px;">操作</th></tr></thead>
        <tbody id="manage-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="selected-panel" class="hidden">
  <div class="sel-panel-header">
    <div class="sel-panel-title">&#9989; 選択中の薬品　<span id="sel-count" style="background:#00b4d8;color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;">0</span></div>
    <button class="btn-clear-all" onclick="clearAll()">&#128465; すべてクリア</button>
  </div>
  <div class="sel-panel-body"><div class="sel-tags" id="sel-tags"></div></div>
</div>
<div class="toast" id="toast"></div>

var PASSWORD = "321899";
var STORAGE_KEY = "med_shelf_data";
var medicines = [];
var selected = [];
var currentFilter = "ALL";
var editingId = null;

function toKatakana(s) {
  return String(s || '').replace(/[\u3041-\u3096]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0) + 0x60);
  });
}
function norm(s) { return toKatakana(String(s || '').normalize('NFKC')); }

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
function doLogin() {
  var val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    init();
  } else {
    var inp = document.getElementById('pw-input');
    document.getElementById('auth-error').textContent = 'パスワードが違います';
    inp.classList.add('shake');
    setTimeout(function() { inp.classList.remove('shake'); document.getElementById('auth-error').textContent = ''; }, 600);
  }
}
function doLogout() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}
function init() {
  var s = localStorage.getItem(STORAGE_KEY);
  medicines = s ? JSON.parse(s) : JSON.parse(JSON.stringify(INITIAL_DATA));
  document.getElementById('search-meta').textContent = '薬品名を入力して検索してください（' + medicines.length + '件）';
  buildFilters(); renderManage();
}
function saveMeds() { localStorage.setItem(STORAGE_KEY, JSON.stringify(medicines)); }

var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function switchTab(name, btn) {
  document.getElementById('tab-search').style.display = name === 'search' ? '' : 'none';
  document.getElementById('tab-manage').style.display = name === 'manage' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (name === 'manage') renderManage();
}
function buildFilters() {
  var shelfSet = {};
  medicines.forEach(function(m) { if (m.shelf) shelfSet[m.shelf] = true; });
  var shelves = ['ALL'].concat(Object.keys(shelfSet).sort());
  var row = document.getElementById('filter-row');
  row.innerHTML = '';
  shelves.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (s === currentFilter ? ' active' : '');
    var count = s === 'ALL' ? medicines.length : medicines.filter(function(m) { return m.shelf === s; }).length;
    btn.textContent = s === 'ALL' ? ('全て(' + count + ')') : (s + '(' + count + ')');
    btn.onclick = function() { currentFilter = s; buildFilters(); doSearch(); };
    row.appendChild(btn);
  });
}
function doSearch() {
  var q = norm(document.getElementById('search-input').value.trim());
  var list = medicines;
  if (currentFilter !== 'ALL') list = list.filter(function(m) { return m.shelf === currentFilter; });

  if (!q) {
    // 未入力時は件数だけ表示、グリッドは空
    document.getElementById('search-meta').textContent = '薬品名を入力して検索してください（' + list.length + '件）';
    document.getElementById('med-grid').innerHTML = '';
    return;
  }

  var scored = [];
  list.forEach(function(m) {
    var ng = norm(m.general), nc = norm(m.generic), nb = norm(m.brand);
    var hit = ng.indexOf(q) >= 0 || nc.indexOf(q) >= 0 || nb.indexOf(q) >= 0;
    if (!hit) return;
    var isPrefix = ng.indexOf(q) === 0 || nc.indexOf(q) === 0 || nb.indexOf(q) === 0;
    scored.push({ med: m, score: isPrefix ? 0 : 1 });
  });
  scored.sort(function(a, b) { return a.score - b.score; });
  list = scored.map(function(s) { return s.med; });

  document.getElementById('search-meta').textContent = list.length + '件ヒット / ' + selected.length + '件選択中';
  renderGrid(list);
}
function renderGrid(list) {
  var grid = document.getElementById('med-grid');
  grid.innerHTML = '';

  if (!list || list.length === 0) {
    var q = document.getElementById('search-input').value.trim();
    if (q) {
      grid.innerHTML = '<div class="empty-hint"><div class="empty-hint-icon">&#128269;</div><div class="empty-hint-text">「' + esc(q) + '」に一致する薬品が見つかりません</div><div class="empty-hint-sub">別のキーワードで検索してください</div></div>';
    }
    return;
  }

  list.forEach(function(med) {
    var isSel = selected.some(function(s) { return s.id === med.id; });
    var div = document.createElement('div');
    div.className = 'med-card' + (isSel ? ' selected' : '');
    div.innerHTML =
      '<div class="check-circle"><span class="check-mark">' + (isSel ? '&#10003;' : '') + '</span></div>' +
      '<div style="min-width:0;flex:1;">' +
        '<div class="med-name"><span style="background:#0077b6;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-right:6px;vertical-align:middle;">一般</span>' + esc(med.general) + '</div>' +
        '<div class="med-meta"><span class="med-meta-label">先発 </span>' + esc(med.brand || 'ー') + '</div>' +
        '<div class="med-meta"><span class="med-meta-label">後発 </span>' + esc(med.generic || 'なし') + '</div>' +
        (med.note && med.note !== 'ー' ? '<div class="med-meta" style="color:#f59e0b;margin-top:2px;">&#128204; ' + esc(med.note) + '</div>' : '') +
        '<span class="shelf-badge">' + esc(med.shelf || 'ー') + '</span>' +
      '</div>';
    div.onclick = function() { toggleSelect(med); };
    grid.appendChild(div);
  });
}
function toggleSelect(med) {
  var idx = -1;
  for (var i = 0; i < selected.length; i++) { if (selected[i].id === med.id) { idx = i; break; } }
  if (idx >= 0) {
    selected.splice(idx, 1);
    toast('選択を解除しました');
    doSearch();
  } else {
    selected.push(med);
    toast('選択しました');
    // 選択後：検索欄・フィルターをリセットして次の検索をしやすく
    document.getElementById('search-input').value = '';
    currentFilter = 'ALL';
    buildFilters();
    doSearch();
    document.getElementById('search-input').focus();
  }
  renderSelectedPanel();
}
function removeSel(id) {
  selected = selected.filter(function(s) { return s.id !== id; });
  doSearch(); renderSelectedPanel();
}
function clearAll() {
  if (selected.length === 0) return;
  selected = []; doSearch(); renderSelectedPanel();
  toast('すべてクリアしました');
}
function renderSelectedPanel() {
  var panel = document.getElementById('selected-panel');
  var tags = document.getElementById('sel-tags');
  var countEl = document.getElementById('sel-count');
  var sc = document.getElementById('tab-search');
  countEl.textContent = selected.length;
  if (selected.length === 0) { panel.classList.add('hidden'); sc.style.paddingBottom = ''; return; }
  panel.classList.remove('hidden');
  sc.style.paddingBottom = '220px';
  tags.innerHTML = '';
  selected.forEach(function(m) {
    var span = document.createElement('span');
    span.className = 'sel-tag';
    var sid = m.id;
    span.innerHTML =
      '<div class="sel-tag-info">' +
        '<span class="sel-tag-general"><span style="background:#0077b6;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-right:5px;">一般</span>' + esc(m.general) + '</span>' +
        (m.brand && m.brand !== 'ー' && m.brand !== 'なし' ? '<span class="sel-tag-brand">先発: ' + esc(m.brand) + '</span>' : '') +
        (m.generic && m.generic !== 'ー' && m.generic !== 'なし' ? '<span class="sel-tag-generic">後発: ' + esc(m.generic) + '</span>' : '') +
        '<span class="sel-tag-shelf">&#127991; ' + esc(m.shelf || 'ー') + '</span>' +
      '</div>' +
      '<span class="sel-remove" onclick="removeSel(' + sid + ')">&#10005;</span>';
    tags.appendChild(span);
  });
}
function renderManage() {
  var tbody = document.getElementById('manage-tbody');
  document.getElementById('manage-count').textContent = medicines.length + '件';
  tbody.innerHTML = '';
  var shelfSet = {};
  medicines.forEach(function(m) { if (m.shelf) shelfSet[m.shelf] = true; });
  var shelfOptions = Object.keys(shelfSet).sort();
  medicines.forEach(function(med, i) {
    var tr = document.createElement('tr');
    if (editingId === med.id) {
      var opts = shelfOptions.map(function(s) {
        return '<option value="' + esc(s) + '"' + (s === med.shelf ? ' selected' : '') + '>' + esc(s) + '</option>';
      }).join('') + '<option value="__custom__">その他(入力)</option>';
      tr.innerHTML =
        '<td>' + (i+1) + '</td>' +
        '<td><input class="edit-input" id="e-general" value="' + esc(med.general) + '"/></td>' +
        '<td><input class="edit-input" id="e-generic" value="' + esc(med.generic) + '"/></td>' +
        '<td><input class="edit-input" id="e-brand" value="' + esc(med.brand) + '"/></td>' +
        '<td><select class="edit-select" id="e-shelf">' + opts + '</select>' +
        '<input class="edit-input" id="e-shelf-custom" placeholder="新しい棚名" style="margin-top:4px;display:none;"/></td>' +
        '<td><input class="edit-input" id="e-note" value="' + esc(med.note) + '"/></td>' +
        '<td><button class="table-btn table-btn-save" onclick="saveEdit(' + med.id + ')">保存</button>' +
        '<button class="table-btn table-btn-cancel" onclick="cancelEdit()">×</button></td>';
      setTimeout(function() {
        var sel = document.getElementById('e-shelf');
        if (sel) sel.onchange = function() {
          document.getElementById('e-shelf-custom').style.display = sel.value === '__custom__' ? '' : 'none';
        };
      }, 0);
    } else {
      tr.innerHTML =
        '<td style="color:#94a3b8;">' + (i+1) + '</td>' +
        '<td style="font-weight:600;">' + esc(med.general) + '</td>' +
        '<td>' + esc(med.generic) + '</td>' +
        '<td>' + esc(med.brand) + '</td>' +
        '<td><span class="shelf-badge">' + esc(med.shelf || 'ー') + '</span></td>' +
        '<td style="color:#94a3b8;font-size:11px;">' + esc(med.note) + '</td>' +
        '<td><button class="table-btn table-btn-edit" onclick="startEdit(' + med.id + ')">編集</button>' +
        '<button class="table-btn table-btn-del" onclick="deleteMed(' + med.id + ')">削除</button></td>';
    }
    tbody.appendChild(tr);
  });
  updateBulkFromSelect();
}
function startEdit(id) { editingId = id; renderManage(); }
function cancelEdit() { editingId = null; renderManage(); }
function saveEdit(id) {
  var med = null;
  for (var i = 0; i < medicines.length; i++) { if (medicines[i].id === id) { med = medicines[i]; break; } }
  if (!med) return;
  var sel = document.getElementById('e-shelf');
  var custom = document.getElementById('e-shelf-custom');
  med.general = document.getElementById('e-general').value.trim();
  med.generic = document.getElementById('e-generic').value.trim();
  med.brand   = document.getElementById('e-brand').value.trim();
  med.shelf   = sel.value === '__custom__' ? custom.value.trim() : sel.value;
  med.note    = document.getElementById('e-note').value.trim();
  editingId = null;
  saveMeds(); buildFilters(); doSearch(); renderManage();
  toast('更新しました');
}
function deleteMed(id) {
  if (!confirm('削除しますか？')) return;
  medicines = medicines.filter(function(m) { return m.id !== id; });
  saveMeds(); buildFilters(); doSearch(); renderManage();
  toast('削除しました');
}
function addNewRow() {
  var newId = Date.now();
  medicines.push({id: newId, general: '（新規）', generic: '', brand: '', shelf: '通常', note: ''});
  saveMeds(); buildFilters(); renderManage(); startEdit(newId);
}
function updateBulkFromSelect() {
  var sel = document.getElementById('bulk-from');
  var shelfSet = {};
  medicines.forEach(function(m) { if (m.shelf) shelfSet[m.shelf] = true; });
  var shelves = Object.keys(shelfSet).sort();
  sel.innerHTML = '<option value="">選択してください</option>' +
    shelves.map(function(s) { return '<option value="' + esc(s) + '">' + esc(s) + '</option>'; }).join('');
}
function doBulkChange() {
  var from = document.getElementById('bulk-from').value;
  var to   = document.getElementById('bulk-to').value.trim();
  if (!from) { toast('変更元の棚種類を選択してください'); return; }
  if (!to)   { toast('変更後の棚名を入力してください'); return; }
  if (!confirm('「' + from + '」→「' + to + '」に一括変更しますか？')) return;
  var count = 0;
  medicines.forEach(function(m) { if (m.shelf === from) { m.shelf = to; count++; } });
  saveMeds(); buildFilters(); doSearch(); renderManage();
  document.getElementById('bulk-result').textContent = count + '件を変更しました';
  toast(count + '件を「' + to + '」に変更しました');
}
function importCSV(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length < 2) { toast('データが見つかりません'); return; }
    var headers = parseCSVLine(lines[0]);
    var colMap = {};
    ['一般名称','後発/ジェネリック','先発','棚の種類','Note'].forEach(function(col) {
      for (var i = 0; i < headers.length; i++) {
        if (headers[i].trim() === col) { colMap[col] = i; break; }
      }
    });
    if (colMap['一般名称'] == null) { toast('「一般名称」列が見つかりません'); return; }
    var imported = []; var baseId = Date.now();
    for (var i = 1; i < lines.length; i++) {
      var cells = parseCSVLine(lines[i]);
      if (!cells.length) continue;
      imported.push({
        id: baseId++,
        general: cells[colMap['一般名称']] || '',
        generic: colMap['後発/ジェネリック'] != null ? (cells[colMap['後発/ジェネリック']] || '') : '',
        brand:   colMap['先発'] != null ? (cells[colMap['先発']] || '') : '',
        shelf:   colMap['棚の種類'] != null ? (cells[colMap['棚の種類']] || '') : '',
        note:    colMap['Note'] != null ? (cells[colMap['Note']] || '') : ''
      });
    }
    if (!confirm(imported.length + '件をインポートします。OK=上書き / キャンセル=追加')) {
      medicines = medicines.concat(imported);
    } else { medicines = imported; }
    saveMeds(); buildFilters(); doSearch(); renderManage();
    toast(imported.length + '件をインポートしました');
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}
function parseCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cur += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { result.push(cur); cur = ''; }
      else { cur += c; }
    }
  }
  result.push(cur); return result;
}
function exportCurrentCSV() {
  var BOM = '\uFEFF';
  var csv = BOM + '一般名称,後発/ジェネリック,先発,棚の種類,Note\n';
  medicines.forEach(function(m) {
    csv += [m.general, m.generic, m.brand, m.shelf, m.note].map(function(v) {
      return '"' + String(v || '').replace(/"/g, '""') + '"';
    }).join(',') + '\n';
  });
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = '医薬品データ.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('CSVを出力しました');
}
function resetToDefault() {
  if (!confirm('初期データに戻します。よろしいですか？')) return;
  medicines = JSON.parse(JSON.stringify(INITIAL_DATA));
  saveMeds(); buildFilters(); doSearch(); renderManage();
  toast('初期データに戻しました');
}
function esc(str) {
  return String(str || '').replace(/[&<>"']/g, function(s) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s];
  });
}

</script>
